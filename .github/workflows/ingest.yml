# Hourly archive ingest — append keyword-matched items, no Teams
name: Hourly Archive Ingest

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: teams-news-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run hourly ingest
        env:
          TRANSLATE_TO_KO: "true"
        run: python main.py --ingest

      - name: Commit archive data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/archive/ web/public/data/archive/ web/public/feed.xml web/public/feed/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "chore: hourly archive ingest"
            git push
          fi
