# AI/tech news digest — posts to Teams via TEAMS_WEBHOOK_URL secret
name: Daily AI Tech News Bot

on:
  schedule:
    # 09:00 KST = 00:00 UTC (daily morning digest)
    - cron: "0 0 * * *"
    # Optional evening digest — uncomment for 18:00 KST (= 09:00 UTC):
    # - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python main.py
